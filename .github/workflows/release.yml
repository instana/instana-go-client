name: Instana Go Client Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Run tests
      shell: bash
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Build
      run: go build -v ./...
    
    - name: Verify go.mod
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Generate changelog
      id: changelog
      run: |
        # Extract changelog for this version
        VERSION="${{ steps.get_version.outputs.version }}"
        
        # Get commits since last tag
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi
        
        # Create changelog
        cat > RELEASE_NOTES.md << EOF
        # Instana Go Client ${VERSION}
        
        ## Changes
        
        ${COMMITS}
        
        ## Installation
        
        \`\`\`bash
        go get github.com/instana/instana-go-client@${VERSION}
        \`\`\`
        
        ## Documentation
        
        - [Quick Start Guide](https://github.com/instana/instana-go-client/blob/${VERSION}/QUICK_START.md)
        - [Configuration Guide](https://github.com/instana/instana-go-client/blob/${VERSION}/DEFAULT_CONFIG_ANALYSIS.md)
        - [API Documentation](https://pkg.go.dev/github.com/instana/instana-go-client@${VERSION})
        EOF
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.tag }}
        name: Instana Go Client ${{ steps.get_version.outputs.version }}
        body: ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}
        files: |
          LICENSE
          README.md
          QUICK_START.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update Go package registry
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        curl -X POST "https://proxy.golang.org/github.com/instana/instana-go-client/@v/${VERSION}.info" || true

  publish-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Generate Go documentation
      run: |
        go install golang.org/x/tools/cmd/godoc@latest
        mkdir -p docs
        godoc -html github.com/instana/instana-go-client/instana > docs/api.html
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        keep_files: true

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, publish-docs]
    if: always()
    
    steps:
    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/go-client/}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Check release status
      run: |
        if [ "${{ needs.create-release.result }}" == "success" ] && [ "${{ needs.publish-docs.result }}" == "success" ]; then
          echo "✅ Release ${{ steps.get_version.outputs.version }} completed successfully"
        else
          echo "❌ Release ${{ steps.get_version.outputs.version }} failed"
          exit 1
        fi

