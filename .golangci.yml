version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    check-type-assertions: true
  
  govet:
    enable-all: true
  
  gosec:
    excludes:
      - G104
      - G304
  
  goconst:
    min-len: 3
    min-occurrences: 3
  
  nakedret:
    max-func-lines: 30

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - goconst
        - staticcheck


