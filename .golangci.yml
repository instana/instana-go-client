run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - revive
    - unconvert
    - unparam
    - gosec
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - stylecheck
    - asciicheck
    - bidichk
    - durationcheck
    - errorlint
    - exhaustive
    - exportloopref
    - gochecknoinits
    - goconst
    - godot
    - gofumpt
    - goprintffuncname
    - makezero
    - nakedret
    - nilerr
    - nilnil
    - nolintlint
    - prealloc
    - predeclared
    - promlinter
    - tenv
    - thelper
    - tparallel
    - wastedassign
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  govet:
    check-shadowing: true
    enable-all: true
  
  gofmt:
    simplify: true
  
  goimports:
    local-prefixes: github.com/instana/instana-go-client
  
  misspell:
    locale: US
  
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
  
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: package-comments
        severity: warning
        disabled: false
      - name: var-naming
        severity: warning
        disabled: false
  
  gosec:
    excludes:
      - G104 # Audit errors not checked
      - G304 # File path provided as taint input
  
  stylecheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
  
  goconst:
    min-len: 3
    min-occurrences: 3
  
  nakedret:
    max-func-lines: 30
  
  prealloc:
    simple: true
    range-loops: true
    for-loops: true

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst
        - typecheck
        - funlen
        - gocognit
    
    # Exclude known issues
    - text: "weak cryptographic primitive"
      linters:
        - gosec
    
    # Exclude shadow checking on err variable
    - text: "shadow: declaration of \"err\""
      linters:
        - govet
    
    # Exclude certain revive rules
    - text: "should have a package comment"
      linters:
        - revive
    
    # Exclude unused parameters in interface implementations
    - text: "parameter .* seems to be unused"
      linters:
        - unparam
  
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true

